<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Columbo</title>
<meta name="theme-color" content="#180e05">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #f2e3c2;
    --gold: #c9a05c;
    --gold-dim: #7d6a4a;
    --rule: #4a3418;
    --note: #a89578;
    --good: #b9c46a;
    --warn: #dfa437;
    --crit: #e06a4b;
  }
  * { box-sizing: border-box; margin: 0; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background:
      radial-gradient(120% 90% at 50% 0%, #33210f 0%, #241608 55%, #180e05 100%)
      #180e05;
    background-attachment: fixed;
    color: var(--ink);
    font: 16px/1.5 Georgia, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
  }
  body::after {  /* film grain */
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    opacity: 0.05;
    background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.6"/></svg>');
  }
  .wrap {
    max-width: 26rem;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top, 0px) + 2rem) 1.3rem 2.5rem;
  }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.34em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
  }
  #title {
    text-align: center;
    margin: 0.5rem 0 0.1rem;
    font-family: "Alfa Slab One", Rockwell, "Courier New", Georgia, serif;
    font-weight: 400;
    font-size: 2.9rem;
    line-height: 1.05;
    letter-spacing: 0.01em;
    color: var(--gold);
    text-shadow: 0 0 22px rgba(217, 164, 65, 0.22);
    text-wrap: balance;
    transition: color 0.5s ease;
  }
  @media (prefers-reduced-motion: reduce) { #title { transition: none; } }
  .good #title { color: var(--good); }
  .warn #title { color: var(--warn); }
  .crit #title { color: var(--crit); }
  #sub {
    text-align: center;
    font-size: 0.78rem;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 1.4rem;
  }
  #reasons {
    text-align: center;
    font-size: 0.85rem;
    font-style: italic;
    margin: -0.9rem 0 1.3rem;
    display: none;
  }
  #reasons.show { display: block; }

  #credits { border-top: 1px solid var(--rule); padding-top: 1rem; display: none; }
  #credits.show { display: block; }
  .crow { display: flex; align-items: baseline; padding: 0.3rem 0; }
  .crow .k {
    letter-spacing: 0.18em;
    font-size: 0.68rem;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
  }
  .crow .dots { flex: 1; border-bottom: 1px dotted var(--rule); margin: 0 0.5rem; }
  .crow .v {
    font: 600 0.95rem ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .crow .v small { display: block; font-weight: 400; font-size: 0.62rem; color: var(--note); }

  #notes { margin-top: 1.4rem; display: none; }
  #notes.show { display: block; }
  #notes h3 {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 0.45rem;
    text-align: center;
    font-weight: 400;
  }
  #notes p {
    font: 0.68rem/1.6 ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    color: var(--note);
    margin: 0.25rem 0;
    overflow-wrap: anywhere;
  }
  #notes .none { text-align: center; font-style: italic; font-family: Georgia, serif; font-size: 0.8rem; }

  #checked {
    margin-top: 1.6rem;
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }
  #line {
    text-align: center;
    font-size: 0.85rem;
    color: var(--note);
    margin-top: 0.4rem;
    display: none;
  }
  #line.show { display: block; }
  #line code {
    font: 0.78rem ui-monospace, Consolas, monospace;
    color: var(--ink);
    overflow-wrap: anywhere;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow" id="eyebrow">Columbo</div>
  <h1 id="title">…</h1>
  <div id="sub"></div>
  <p id="reasons"></p>

  <div id="credits">
    <div class="crow"><span class="k">Last cycle</span><span class="dots"></span><span class="v" id="t-cycle">–</span></div>
    <div class="crow"><span class="k">Heartbeat</span><span class="dots"></span><span class="v" id="t-heart">–</span></div>
    <div class="crow"><span class="k">Cycles today</span><span class="dots"></span><span class="v" id="t-cycles">–</span></div>
    <div class="crow"><span class="k">Gaps · 24h</span><span class="dots"></span><span class="v" id="t-gaps">–</span></div>
    <div class="crow"><span class="k">Evaluations</span><span class="dots"></span><span class="v" id="t-evals">–</span></div>
    <div class="crow"><span class="k">Settlements</span><span class="dots"></span><span class="v" id="t-settle">–</span></div>
    <div class="crow"><span class="k">Credits · run</span><span class="dots"></span><span class="v" id="t-run">–</span></div>
    <div class="crow"><span class="k">Credits · month</span><span class="dots"></span><span class="v" id="t-month">–</span></div>
  </div>

  <div id="notes">
    <h3>Tonight's notes</h3>
    <div id="alerts"></div>
  </div>

  <p id="line"></p>
  <div id="checked"></div>
</div>

<script>
(function () {
  "use strict";
  var REPO = "ericlawson/columbo-status";
  var STALE_MIN = 20;
  var el = function (id) { return document.getElementById(id); };

  function token() {
    var m = location.hash.match(/[#&]t=([A-Za-z0-9_]+)/);
    if (m) { try { localStorage.setItem("columbo-t", m[1]); } catch (e) {} return m[1]; }
    try { return localStorage.getItem("columbo-t"); } catch (e) { return null; }
  }

  function age(s) {
    if (s == null) return "unknown";
    if (s < 120) return Math.round(s) + "s ago";
    if (s < 7200) return Math.round(s / 60) + " min ago";
    return (s / 3600).toFixed(1) + " h ago";
  }
  function num(n) { return n == null ? "–" : n.toLocaleString("en-US"); }

  function card(cls, eyebrow, title, sub, reasons) {
    document.body.className = cls;
    el("eyebrow").textContent = eyebrow;
    el("title").textContent = title;
    el("sub").textContent = sub || "";
    el("reasons").textContent = reasons || "";
    el("reasons").classList.toggle("show", !!reasons);
  }
  function showData(show) {
    el("credits").classList.toggle("show", show);
    el("notes").classList.toggle("show", show);
  }
  function line(html) {
    el("line").innerHTML = html || "";
    el("line").classList.toggle("show", !!html);
  }

  function render(d) {
    var gen = new Date(d.generated_at);
    var staleMin = (Date.now() - gen.getTime()) / 60000;
    var when = "logged " + d.generated_at.slice(11, 16) + "Z · " +
      gen.toLocaleDateString("en-US", { month: "long", day: "numeric" }).toLowerCase();

    if (staleMin > STALE_MIN) {
      card("crit", "Columbo · interrupted", "STALE",
        when, "no fresh publish in " + Math.round(staleMin) + " minutes");
    } else if (d.verdict === "red") {
      card("crit", "Columbo · in tonight's episode", "NEEDS EYES",
        when, "“" + (d.reasons || []).join("; ") + "”");
    } else if (d.verdict === "yellow") {
      card("warn", "Columbo · in tonight's episode", "ATTENTION",
        when, "“" + (d.reasons || []).join("; ") + "”");
    } else {
      card("good", "Columbo · in tonight's episode", "HEALTHY", when, "");
    }
    line("");
    showData(true);

    el("t-cycle").textContent = age(d.last_cycle_age_s);
    el("t-heart").textContent = age(d.heartbeat_age_s);
    el("t-cycles").textContent = num(d.cycles_today);
    el("t-gaps").textContent = num(d.gaps_24h);
    el("t-evals").textContent = num(d.evaluations_today) + " / " + num(d.evaluations_total);
    el("t-settle").textContent = num(d.settlements_total);
    el("t-run").textContent = num(d.run_spent) + (d.credit_cap ? " / " + num(d.credit_cap) : "");
    var month = el("t-month");
    month.textContent = "";
    month.appendChild(document.createTextNode(num(d.monthly_used) + " used"));
    if (d.monthly_remaining != null) {
      var small = document.createElement("small");
      small.textContent = num(d.monthly_remaining) + " remaining";
      month.appendChild(small);
    }

    var alerts = el("alerts");
    alerts.textContent = "";
    if (d.alerts && d.alerts.length) {
      d.alerts.slice().reverse().forEach(function (a) {
        var p = document.createElement("p");
        p.textContent = a;
        alerts.appendChild(p);
      });
    } else {
      var none = document.createElement("p");
      none.className = "none";
      none.textContent = "nothing in the notebook";
      alerts.appendChild(none);
    }
  }

  function refresh() {
    var t = token();
    if (!t) {
      card("", "Columbo · setup", "NO TOKEN", "", "");
      showData(false);
      line("open once via <code>#t=&lt;read-token&gt;</code>, then add to home screen");
      return;
    }
    fetch("https://api.github.com/repos/" + REPO + "/contents/data.json?ts=" + Date.now(), {
      headers: {
        Authorization: "Bearer " + t,
        Accept: "application/vnd.github.raw+json",
        "X-GitHub-Api-Version": "2022-11-28"
      },
      cache: "no-store"
    }).then(function (r) {
      if (r.status === 401 || r.status === 403) throw new Error("auth");
      if (r.status === 404) throw new Error("nodata");
      if (!r.ok) throw new Error("http " + r.status);
      return r.json();
    }).then(function (d) {
      el("checked").textContent = "checked " + new Date().toTimeString().slice(0, 5);
      render(d);
    }).catch(function (e) {
      el("checked").textContent = "checked " + new Date().toTimeString().slice(0, 5);
      if (e.message === "auth") {
        card("warn", "Columbo · setup", "TOKEN REJECTED", "",
          "mint a new read token, reopen via the full link");
        showData(false); line("");
      } else if (e.message === "nodata") {
        card("", "Columbo · previews", "NO DATA YET", "",
          "the publisher hasn't filed its first report");
        showData(false); line("");
      } else {
        card("warn", "Columbo · off air", "OFFLINE", "",
          "can't reach GitHub — retrying");
        // keep last data visible if any was rendered
      }
    });
  }

  refresh();
  setInterval(refresh, 5 * 60 * 1000);
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) refresh();
  });
})();
</script>
</body>
</html>
